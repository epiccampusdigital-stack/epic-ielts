  <rect x="130" y="375" width="14" height="14" fill="#1d4ed8" rx="2"/>
  <text x="148" y="386" font-size="11" fill="#475569">Age 18-34</text>
  <rect x="260" y="375" width="14" height="14" fill="#60a5fa" rx="2"/>
  <text x="278" y="386" font-size="11" fill="#475569">Age 35-54</text>
  <rect x="390" y="375" width="14" height="14" fill="#bfdbfe" rx="2"/>
  <text x="408" y="386" font-size="11" fill="#475569">Age 55+</text>
  <!-- X axis -->
  <line x1="50" y1="320" x2="670" y2="320" stroke="#1e293b" stroke-width="1.5"/>
  <!-- Y axis -->
  <line x1="50" y1="50" x2="50" y2="320" stroke="#1e293b" stroke-width="1.5"/>
